name: ResolveAI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio "testcontainers[postgres,redis]" ruff httpx

      - name: Lint with Ruff
        run: ruff check src/ tests/ scripts/

      - name: Unit tests (no containers, fake LLM)
        env:
          USE_FAKE_LLM: "true"
        run: pytest tests/unit tests/contract --cov=resolveai --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio "testcontainers[postgres,redis]" httpx

      # Testcontainers spins up ephemeral pgvector + Redis using the runner's Docker daemon
      - name: Integration and E2E tests (fake LLM)
        env:
          USE_FAKE_LLM: "true"
        run: pytest tests/integration tests/e2e
