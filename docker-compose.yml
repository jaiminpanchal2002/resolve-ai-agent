services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resolveai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resolveai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resolveai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: resolveai-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/resolveai
      DATABASE_SYNC_URL: postgresql+psycopg://postgres:postgres@postgres:5432/resolveai
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn resolveai.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    container_name: resolveai-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/resolveai
      DATABASE_SYNC_URL: postgresql+psycopg://postgres:postgres@postgres:5432/resolveai
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A resolveai.tasks.tasks:celery_app worker --loglevel=info --concurrency=2

  frontend:
    image: node:20-alpine
    container_name: resolveai-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: resolveai-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

volumes:
  postgres_data:
  redis_data:
